# =============================================================================
# Байдабаза — Public Web container (internal nginx)
# Serves the kayak rental public site.
# =============================================================================

# Add webmanifest MIME type (nginx doesn't include it by default)
types {
    application/manifest+json   webmanifest;
}

server {
    listen 80;
    root /usr/share/nginx/html/web;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/manifest+json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # PWA: service worker — must be served with no-cache
    location ~* /sw\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # PWA: manifest — no-cache
    location ~* \.(webmanifest|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/manifest+json";
        try_files $uri =404;
    }

    # SPA: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================================
# Байдабаза — Admin CRM container (internal nginx)
# =============================================================================
# The main nginx strips /crm/ BEFORE proxying here (proxy_pass http://admin_backend/).
# So this nginx always receives paths WITHOUT the /crm prefix.
# Example: /crm/orders → arrives here as /orders
# This container just serves a plain SPA from root.
# =============================================================================

# Add webmanifest MIME type (nginx doesn't include it by default)
types {
    application/manifest+json   webmanifest;
}

server {
    listen 80;
    root /usr/share/nginx/html/admin;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/manifest+json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # PWA: service worker — must be served with no-cache so browser always gets latest
    location ~* /sw\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # PWA: manifest — no-cache so browser picks up name/icon changes
    location ~* \.(webmanifest|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/manifest+json";
        try_files $uri =404;
    }

    # SPA: serve index.html for all routes (React Router handles navigation)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long cache (JS/CSS are fingerprinted by Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================================
# Байдабаза — Nginx Reverse Proxy (HTTP-only / default config)
# =============================================================================
# This config works WITHOUT SSL certificates.
# Nginx starts successfully on a clean server with no certs.
# After getting Let's Encrypt certs: bash deploy/enable-ssl.sh YOUR_DOMAIN
# =============================================================================

upstream api_backend {
    server api:8080;
    keepalive 32;
}

upstream web_backend {
    server web:80;
    keepalive 16;
}

upstream admin_backend {
    server admin:80;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 50m;

    # ── Let's Encrypt webroot challenge (certbot) ───────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── Static uploads ──────────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── SEO files (robots.txt, sitemap.xml, YML feed) ───────────────────────
    # These are served by the API server at root-level paths (no /api prefix).
    location = /robots.txt {
        proxy_pass http://api_backend/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://api_backend/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1h;
    }

    location = /feed.xml {
        proxy_pass http://api_backend/feed.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 30m;
    }

    location ^~ /feed/ {
        proxy_pass http://api_backend/feed/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 30m;
    }

    # ── API + WebSocket ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade (for chat)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Admin CRM (/crm/) ───────────────────────────────────────────────────
    # Strips /crm/ prefix before proxying to admin container.
    # Admin container is a plain SPA served from root — no /crm routing inside.
    # proxy_pass with trailing slash performs the prefix-stripping.
    location /crm/ {
        proxy_pass http://admin_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Redirect /crm → /crm/
    location = /crm {
        return 301 /crm/;
    }

    # ── Public website (/') ─────────────────────────────────────────────────
    location / {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

version: "3.9"

networks:
  baydabaza:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  redis_data:
  certbot_data:

services:
  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --save 60 1
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - baydabaza
    volumes:
      - redis_data:/data
    healthcheck:
      # Works whether REDIS_PASSWORD is set or empty.
      # redis-cli -a "" with requirepass "" (empty = disabled) returns PONG.
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a '${REDIS_PASSWORD:-}' ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baydabaza}
      POSTGRES_USER: ${POSTGRES_USER:-baydabaza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - baydabaza
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baydabaza}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── NestJS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    # Expose API on loopback only — install.sh uses curl http://localhost:8080
    # External access goes through nginx (ports 80/443)
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-baydabaza}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-baydabaza}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT:-300}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL:-http://localhost}
      ADMIN_URL: ${ADMIN_URL:-http://localhost/crm}
      BOOTSTRAP_SUPERADMIN_CREATE: ${BOOTSTRAP_SUPERADMIN_CREATE:-false}
      BOOTSTRAP_SUPERADMIN_EMAIL: ${BOOTSTRAP_SUPERADMIN_EMAIL:-}
      BOOTSTRAP_SUPERADMIN_PASSWORD: ${BOOTSTRAP_SUPERADMIN_PASSWORD:-}
      BOOTSTRAP_SUPERADMIN_FIRST_NAME: ${BOOTSTRAP_SUPERADMIN_FIRST_NAME:-Администратор}
      BOOTSTRAP_SUPERADMIN_LAST_NAME: ${BOOTSTRAP_SUPERADMIN_LAST_NAME:-}
      BOOTSTRAP_SUPERADMIN_PHONE: ${BOOTSTRAP_SUPERADMIN_PHONE:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_MANAGER_GROUP_ID: ${TELEGRAM_MANAGER_GROUP_ID:-}
      TELEGRAM_FORUM_CHAT_ID: ${TELEGRAM_FORUM_CHAT_ID:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      PUBLIC_UPLOADS_URL: ${PUBLIC_UPLOADS_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - baydabaza
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      # Use Node.js built-in http — no curl/wget needed in bookworm-slim
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/api/auth/healthz', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Public Website ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    networks:
      - baydabaza

  # ── Admin CRM ────────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    networks:
      - baydabaza

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Default: HTTP-only config (no certs required).
      # After SSL setup: bash deploy/enable-ssl.sh YOUR_DOMAIN
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
      - certbot_data:/var/www/certbot:ro
    networks:
      - baydabaza
    depends_on:
      - api
      - web
      - admin

version: "3.9"

networks:
  kayakrent:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kayakrent}
      POSTGRES_USER: ${POSTGRES_USER:-kayakrent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kayakrent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kayakrent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-kayakrent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kayakrent}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL}
      ADMIN_URL: ${ADMIN_URL}
    networks:
      - kayakrent
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Public Website (kayak-rental) ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    networks:
      - kayakrent

  # ── Admin CRM ────────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    networks:
      - kayakrent

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro       # Place your SSL certs here
      - uploads_data:/var/www/uploads:ro
    networks:
      - kayakrent
    depends_on:
      - api
      - web
      - admin

kind = "web"
previewPath = "/"
title = "Kayak Rental Platform"
version = "1.0.0"
id = "artifacts/kayak-rental"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26261

[services.development]
run = "pnpm --filter @workspace/kayak-rental run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kayak-rental", "run", "build" ]
publicDir = "artifacts/kayak-rental/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26261"
BASE_PATH = "/"
